on:
  release:
    types: [published]

name: Attach Rendered Site to Release

permissions:
  contents: write

jobs:
  build-and-attach:
    name: Build Site and Upload Release Asset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Overwrite _quarto.yml
        if: github.repository == 'maehr/open-research-data-template'
        run: |
          cp .github/_quarto.yml _quarto.yml

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync Python dependencies
        run: uv sync

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
      - uses: r-lib/actions/setup-renv@v2

      - name: Build site archive
        run: npm run site:build && npm run site:archive -- --tag ${{ github.event.release.tag_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release-artifacts/site-${{ github.event.release.tag_name }}.zip
