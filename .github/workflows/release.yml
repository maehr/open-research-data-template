on:
  release:
    types: [published]

name: Attach Rendered Site to Release

permissions:
  contents: write

jobs:
  build-and-attach:
    name: Build Site and Upload Release Asset
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      # The template repository release archive should match the showcase site.
      # Forks and repositories created from the template use root project-facing files.
      - name: Use template showcase Quarto files
        if: github.repository == 'maehr/open-research-data-template'
        run: |
          cp .github/template-site/_quarto.yml _quarto.yml
          cp .github/template-site/index.qmd index.qmd
          cp .github/template-site/agent-release-workflow.qmd release-workflow.qmd

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2.2.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync Python dependencies
        run: uv sync

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
      - uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 2

      - name: Build site archive
        run: npm run site:build && npm run site:archive -- --tag ${{ github.event.release.tag_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: release-artifacts/site-${{ github.event.release.tag_name }}.zip
